<svg xmlns="http://www.w3.org/2000/svg" width="250" height="96" viewBox="0 0 250 96" role="img" aria-label="REbricked - latest edition">
  <title>REbricked - latest edition</title>
  <!-- Rebricked-console rail background -->
  <rect x="0.5" y="0.5" width="249" height="95" rx="16" fill="#0E1116" stroke="#232833"/>

  <!-- "RE" as an inverted chip - the whole point (re-named) -->
  <rect x="28" y="28" width="58" height="40" rx="7" fill="#ffffff"/>
  <text x="57" y="57" text-anchor="middle" fill="#0E1116"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="27" font-weight="800" letter-spacing="-0.5">RE</text>

  <!-- wordmark -->
  <text x="92" y="57" fill="#ffffff"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="30" font-weight="700" letter-spacing="-0.3">bricked</text>

  <!-- edition tag, right-aligned under the wordmark -->
  <text x="222" y="73" text-anchor="end" fill="#6B7480"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="9" font-weight="600" letter-spacing="2">LATEST EDITION</text>
</svg>
