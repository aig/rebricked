<svg xmlns="http://www.w3.org/2000/svg" width="300" height="96" viewBox="0 0 300 96" role="img" aria-label="REbricked — latest edition">
  <title>REbricked — latest edition</title>
  <!-- Databricks-console rail background -->
  <rect x="0.5" y="0.5" width="299" height="95" rx="16" fill="#0E1116" stroke="#232833"/>

  <!-- Brick emblem (three isometric layers), Databricks red -->
  <g transform="translate(28 26) scale(1.375)" fill="#FF3621">
    <path d="M2 11.2 16 4l14 7.2-3.1 1.6L16 7.2 5.1 12.8Z" opacity=".95"/>
    <path d="M2 16 16 8.8 30 16l-3.1 1.6L16 12l-10.9 5.6Z" opacity=".8"/>
    <path d="M2 20.8 16 13.6 30 20.8 16 28 2 20.8Zm3.1.1L16 26.4l10.9-5.5L16 16.8Z" opacity=".65"/>
  </g>

  <!-- "RE" as an inverted chip — the whole point (re-named) -->
  <rect x="86" y="28" width="58" height="40" rx="7" fill="#ffffff"/>
  <text x="115" y="57" text-anchor="middle" fill="#0E1116"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="27" font-weight="800" letter-spacing="-0.5">RE</text>

  <!-- wordmark -->
  <text x="150" y="57" fill="#ffffff"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="30" font-weight="700" letter-spacing="-0.3">bricked</text>

  <!-- edition tag, right-aligned under the wordmark -->
  <text x="270" y="73" text-anchor="end" fill="#6B7480"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="9" font-weight="600" letter-spacing="2">LATEST EDITION</text>
</svg>
